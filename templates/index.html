<!-- this is the front end 
This uses a standard HTML form and Jinja2 (the {{ name }} syntax) to display the result. 
-->

<!DOCTYPE html>
<html>
<head>
    <title>Name App</title>
</head>
<body>
    <form method="POST">
        <input type="text" name="user_name" placeholder="Enter name" required>
        <button type="submit">Submit</button>
    </form>

    {% if name %}
        <h1>Hello, {{ name }}!</h1>
    {% endif %}
</body>
</html>
